<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Programar Sesión - Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
  <link rel="stylesheet" href="{{url_for('static',filename='css/admin_base.css')}}">
  <link rel="stylesheet" href="{{url_for('static',filename='css/admin_formulario.css')}}">
</head>

<body>
  <!-- Inicio de SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-header">
      <h1> Rehab IoT <h1>
    </div>
    <ul class="nav-links">
      <li><a href="{{url_for('admin_dashboard')}}"><i class="fa-solid fa-arrows-to-circle"></i>
          Dashboard</a></li>
      <li><a href="{{url_for('admin_obtenerPacientes')}}"> <i class="fa-solid fa-clipboard-user"></i>Pacientes</a></li>
      <li><a href="{{url_for('admin_obtenerTerapeutas')}}"> <i class="fa-solid fa-user-group"></i> Terapeutas</a></li>
      <li><a href="{{url_for('admin_obtenerSesiones')}}" class="active"> <i class="fa-solid fa-house-chimney-user"></i>
          Sesiones </a>
      </li>
      <li><a href="{{url_for('admin_obtenerBeacons')}}"><i class="fa-solid fa-cubes-stacked"></i> Zonas (Beacons)</a>
      </li>
      <li><a href="{{url_for('admin_reportes')}}"> <i class="fa-solid fa-book"></i> Reportes </a></li>
      <li><a href="{{url_for('principal')}}"><i class="fa-solid fa-arrow-right-from-bracket"></i> Cerrar Sesión</a></li>
    </ul>
  </nav>
  <!-- Fin de SIDEBAR -->

  <main class="main-content">
    <div class="form-card">
      <div class="form-header">
        <h2>Asignación Central de Sesiones</h2>
        <p style="color: var(--text-light); margin: 5px 0 0 0;">Asigna citas vinculando a un paciente con un terapeuta y
          ubicación.</p>
      </div>

      <form action="/admin/sesiones/guardar" method="POST">
        <div class="form-grid">
          <div class="form-group">
            <label>Seleccionar Paciente</label>
            <select name="id_paciente" class="form-control" required>
              <option value="">Buscar paciente...</option>
              <option value="PAC-1042">Ana López García</option>
              <option value="PAC-1088">Carlos Ruiz</option>
            </select>
          </div>

          <div class="form-group">
            <label>Terapeuta Encargado</label>
            <select name="id_terapeuta" class="form-control" required>
              <option value="">Asignar terapeuta...</option>
              <option value="TER-01">Dr. Martínez</option>
              <option value="TER-02">Dra. Gómez</option>
            </select>
          </div>

          <div class="form-group">
            <label>Fecha de la Sesión</label>
            <input type="date" name="fecha" class="form-control" required>
          </div>
          <div class="form-group">
            <label>Modalidad</label>
            <select name="modalidad" class="form-control" required>
              <option value="clinica">En Clínica (Presencial)</option>
              <option value="domicilio">A Domicilio</option>
            </select>
          </div>
          <div class="form-group">
            <label>Hora de inicio</label>
            <input type="time" id="hora_inicio" name="hora_inicio" class="form-control" requires>
          </div>
          <div class="form-group">
            <label>Hora de fin</label>
            <input type="time" id="hora_fin" name="hora_fin" class="form-control" required>
          </div>
          <div class="form-group">
            <label>Asistencia</label>
            <select id="asistencia" name="asistencia" class="form-control">
              <option value="" disabled selected>Selecciona una opción...</option>
              <option value="1">Asistió</option>
              <option value="0">Falta sin aviso</option>
            </select>
          </div>
          <div class="form-group">
            <label for="metodo_registro">Método de registro</label>
            <select id="metodo_registro" name="metodo_registro" class="form-control" required>
              <option value="" disabled selected>Selecciona una opción...</option>
              <option value="presencial">Presencial</option>
              <option value="online">Videollamada (Online)</option>
              <option value="telefonica">Llamada telefónica</option>
            </select>
          </div>
        </div>
        <div class="form-group full-width">
          <label>Comentarios Administrativos</label>
          <textarea name="observaciones" class="form-control" rows="3"
            placeholder="Ej. El paciente debe liquidar saldo pendiente antes de iniciar la sesión..."></textarea>
        </div>
        <button type="submit" class="btn-submit"><i class="fa-solid fa-calendar-check"></i> Registrar Cita en el
          Sistema</button>
      </form>
    </div>
  </main>
</body>

</html>
