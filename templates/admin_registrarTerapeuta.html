<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alta de Terapeuta - Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
  <link rel="stylesheet" href="{{url_for('static',filename='css/admin_base.css')}}">
  <link rel="stylesheet" href="{{url_for('static',filename='css/admin_formulario.css')}}">
</head>

<body> <!-- Inicio de SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-header">
      <h1> Rehab IoT <h1>
    </div>
    <ul class="nav-links">
      <li><a href="{{url_for('admin_dashboard')}}"><i class="fa-solid fa-arrows-to-circle"></i>
          Dashboard</a></li>
      <li><a href="{{url_for('admin_obtenerPacientes')}}"> <i class="fa-solid fa-clipboard-user"></i>Pacientes</a></li>
      <li><a href="{{url_for('admin_obtenerTerapeutas')}}" class="active"> <i class="fa-solid fa-user-group"></i>
          Terapeutas</a></li>
      <li><a href="{{url_for('admin_obtenerSesiones')}}"> <i class="fa-solid fa-house-chimney-user"></i> Sesiones </a>
      </li>
      <li><a href="{{url_for('admin_obtenerBeacons')}}"><i class="fa-solid fa-cubes-stacked"></i> Zonas (Beacons)</a>
      </li>
      <li><a href="{{url_for('admin_reportes')}}"> <i class="fa-solid fa-book"></i> Reportes </a></li>
      <li><a href="{{url_for('principal')}}"><i class="fa-solid fa-arrow-right-from-bracket"></i> Cerrar Sesión</a></li>
    </ul>
  </nav>
  <!-- Fin de SIDEBAR -->

  <main class="main-content">
    <div class="form-card">
      <div class="form-header">
        <h2>Alta de Nuevo Usuario / Personal</h2>
        <p style="color: var(--text-light); margin: 5px 0 0 0;">Ingresa los datos del nuevo Terapeuta a la base de
          datos.
        </p>
      </div>

      <form action="" method="POST">
        <h3 class="section-title"><i class="fa-regular fa-address-card"></i> Datos Personales</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>Nombre(s)</label>
            <input type="text" name="nombre" class="form-control" required placeholder="Nombre(s)">
          </div>
          <div class="form-group">
            <label>Apellido Paterno</label>
            <input type="text" name="apellido_paterno" class="form-control" required placeholder="Apellido Paterno">
          </div>
          <div class="form-group">
            <label>Apellido Materno</label>
            <!-- Este deberia ser opcional modificar bd-->
            <input type="text" name="apellido_materno" class="form-control" required placeholder="Apellido Materno">
          </div>
          <div class="form-group">
            <label>Fecha de Nacimiento</label>
            <input type="date" name="fecha_nacimiento" class="form-control" required>
          </div>
          <div class="form-group">
            <label>Sexo</label>
            <select name="sexo" class="form-control" required>
              <option value="">Seleccione su sexo...</option>
              <option value="1">Masculino</option>
              <option value="2">Femenino</option>
            </select>
          </div>
          <div class="form-group">
            <label>Teléfono (Móvil)</label>
            <input type="tel" name="telefono" class="form-control" required>
          </div>
          <div class="form-group">
            <label>Correo</label>
            <input type="mail" name="correo" class="form-control" required>
          </div>
          <div class="form-group full-width">
            <label>Direccion Actual</label>
            <input type="input" name="direccion_paciente" class="form-control" required>
          </div>
          <div class="form-group terapeuta-fields" style="display: none;">
            <label>Especialidad Médica</label>
            <input type="text" name="especialidad" class="form-control" placeholder="Ej. Fisioterapia Deportiva">
          </div>
        </div>
        <button type="submit" class="btn-submit"><i class="fa-solid fa-floppy-disk"></i> Guardar Expediente</button>
      </form>
  </main>
</body>

</html>
